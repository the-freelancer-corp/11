<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #c8f135;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      background: var(--accent);
      opacity: 0.07;
      border-radius: 50%;
      filter: blur(40px);
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .amount {
      font-family: 'Syne', sans-serif;
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      display: flex;
      align-items: flex-start;
      gap: 4px;
      margin-bottom: 8px;
      animation: fadeUp 0.6s ease both;
    }

    .amount .currency {
      font-size: 28px;
      margin-top: 6px;
      color: var(--accent);
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .withdraw-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0 0 rgba(200,241,53,0);
    }

    .withdraw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,241,53,0.25);
    }

    .withdraw-btn:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e1e;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="label">Available Balance</p>
    <div class="amount">
      <span class="currency">₹</span>
      <span id="balanceNum">5,000</span>
    </div>
    <p class="sub">Photos earnings · Updated just now</p>
    <hr class="divider"/>
    <button class="withdraw-btn" onclick="handleWithdraw()">Withdraw</button>
  </div>

  <div class="toast" id="toast">✅ Withdrawal request submitted!</div>

  <script>
    function handleWithdraw() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>

</body>
</html>
